<svg xmlns="http://www.w3.org/2000/svg" width="860" height="162" viewBox="0 0 860 162" role="img" aria-label="GitHub stats">
<defs><style>text{font-family:'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif;}.num{font-weight:800;font-size:32px;fill:#e6edf3;text-anchor:middle;}.lab{font-weight:600;font-size:13px;fill:#8b949e;text-anchor:middle;}.emoji{font-size:18px;text-anchor:middle;}.tile{animation:rise .5s ease both;}.t0{animation-delay:0.05s}.t1{animation-delay:0.13s}.t2{animation-delay:0.21s}.t3{animation-delay:0.29s}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}</style></defs>
<rect width="860" height="162" rx="16" fill="#0d1117"/>
<g class="tile t0">
  <rect x="28.0" y="28" width="189.0" height="106" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="28.0" y="28" width="4" height="106" rx="2" fill="#7aa2f7"/>
  <text class="emoji" x="122.5" y="64">🗓️</text>
  <text class="num" x="122.5" y="102">11+</text>
  <text class="lab" x="122.5" y="126">years on GitHub</text>
</g>
<g class="tile t1">
  <rect x="233.0" y="28" width="189.0" height="106" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="233.0" y="28" width="4" height="106" rx="2" fill="#bb9af7"/>
  <text class="emoji" x="327.5" y="64">⚡</text>
  <text class="num" x="327.5" y="102">10k</text>
  <text class="lab" x="327.5" y="126">contributions</text>
</g>
<g class="tile t2">
  <rect x="438.0" y="28" width="189.0" height="106" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="438.0" y="28" width="4" height="106" rx="2" fill="#9ece6a"/>
  <text class="emoji" x="532.5" y="64">📈</text>
  <text class="num" x="532.5" y="102">635</text>
  <text class="lab" x="532.5" y="126">this year</text>
</g>
<g class="tile t3">
  <rect x="643.0" y="28" width="189.0" height="106" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="643.0" y="28" width="4" height="106" rx="2" fill="#e0af68"/>
  <text class="emoji" x="737.5" y="64">🔥</text>
  <text class="num" x="737.5" y="102">21</text>
  <text class="lab" x="737.5" y="126">longest streak</text>
</g>
</svg>