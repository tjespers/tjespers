name: Refresh profile visuals

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate the snake on every push to the default branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ── Contribution snake → pushed to the `output` branch ──────────────────────
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stats card → regenerated from the GitHub API, committed back to main ────
  # Runs on schedule / manual only (NOT on push) to avoid re-triggering itself.
  stats:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate stats SVGs
        # STATS_TOKEN (a PAT with read:user / repo scope) gives full counts
        # including private contributions. Without it, falls back to the default
        # token, which only sees PUBLIC contributions (lower numbers).
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 scripts/gen-stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-dark.svg assets/stats-light.svg
          if git diff --staged --quiet; then
            echo "Stats unchanged — nothing to commit."
          else
            git commit -m "chore: refresh GitHub stats card [skip ci]"
            git push
          fi
